name: Dump Entities from Baserow

on:
  schedule:
  - cron: "19 22 * * *"
  workflow_dispatch:

jobs:
  download:
    name: dump baserow
    runs-on: ubuntu-latest
    env:
      BASEROW_TOKEN: ${{ secrets.BASEROW_TOKEN }}
      BASEROW_USER: ${{ secrets.BASEROW_USER }}
      BASEROW_PW: ${{ secrets.BASEROW_PW }}
    steps:
      - name: checkout the repo  
        uses: actions/checkout@v7
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.3.2
      - name: dump the data
        run: |
          uv run src/enrich_places.py
          uv run src/dump_data.py
          uv run src/join_tables.py
          uv run src/make_xml.py
      - name: Commit data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Data update from Baserow
